<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Manga Halftone Button</title>
    <style>
        :root {
            --bg-color: #ffde00; /* 經典漫畫黃 */
            --dot-color: #000;
            --border-color: #000;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
        }

        .manga-btn {
            position: relative;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            background-color: var(--bg-color);
            border: 4px solid var(--border-color);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
            
            /* 核心：利用背景漸變製作小圓點 */
            background-image: radial-gradient(var(--dot-color) 20%, transparent 25%);
            background-size: 8px 8px; /* 圓點的大小與間距 */
            
            /* 加上文字描邊與陰影，增加漫畫感 */
            text-shadow: 3px 3px 0px #000;
            box-shadow: 8px 8px 0px #000;
        }

        /* 懸停效果：讓圓點動起來 */
        .manga-btn:hover {
            background-position: 4px 4px;
            background-color: #ff5252; /* 懸停變紅 */
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px #000;
        }

        /* 點擊效果 */
        .manga-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #000;
        }

        /* 裝飾：按鈕背後的對話框感 (選配) */
        .manga-btn::after {
            content: 'CLICK!';
            position: absolute;
            top: -30px;
            right: -30px;
            background: #fff;
            color: #000;
            padding: 5px 10px;
            border: 3px solid #000;
            font-size: 14px;
            transform: rotate(15deg);
        }
    </style>
</head>
<body>

    <button class="manga-btn">
        Start Game
    </button>

</body>
</html>
